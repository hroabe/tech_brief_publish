<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech News Radio - 2026-03-08</title>
<style>:root {
  --bg: #121212;
  --surface: #1E1E1E;
  --surface-strong: #252525;
  --border: rgba(255, 255, 255, 0.05);
  --text: #E0E0E0;
  --text-muted: #A0A0A0;
  --accent: #00D8FF;
  --accent-light: #6C8AFF;
  --accent-soft: rgba(0, 216, 255, 0.1);
  --success: #10b981;
  --warning: #f59e0b;
  --strong: #fff;
  --border-radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-strong: #f0f0f0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #666666;
  --accent: #0099b3;
  --accent-light: #5060c0;
  --accent-soft: rgba(0, 153, 179, 0.08);
  --success: #059669;
  --warning: #d97706;
  --strong: #000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, textarea, select { font: inherit; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  margin-bottom: 0;
}
header .container { padding: 24px 20px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 a { color: var(--strong); }
header h1 a:hover { text-decoration: none; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.nav-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a {
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: bold;
  padding: 8px 16px;
  transition: color 0.2s ease;
}
.nav-links a:hover { color: var(--strong); text-decoration: none; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.35rem 0.6rem;
  line-height: 1;
  transition: background 0.3s, border-color 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Section titles */
.section-title {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--strong);
  letter-spacing: 0.05em;
}
.section-subtitle {
  font-size: 1.4rem;
  font-weight: bold;
  margin: 40px 0 20px;
  color: var(--strong);
}
.section-desc {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}
.col-half { width: calc(50% - 12px); }
.col-full { width: 100%; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 28px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
  border-color: rgba(0, 216, 255, 0.3);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
  border-color: rgba(0, 153, 179, 0.3);
}
.card h2 {
  font-size: 1.25rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card ul { list-style: none; padding-left: 0; margin: 0; }
.card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
  color: var(--text);
}
.card li:last-child { margin-bottom: 0; }
.list-check li::before { content: '\2713'; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.1em; }
.list-arrow li::before { content: '\2794'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.9em; top: 0.1em; }
.list-dot li::before { content: '\25A0'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.6em; top: 0.5em; }

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 1.5rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 16px;
  line-height: 1.4;
}
.hero-description {
  color: var(--text-muted);
  margin-bottom: 24px;
}
.hero-description:last-of-type { margin-bottom: 24px; }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.hero-pill {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid rgba(0, 216, 255, 0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
}
[data-theme="light"] .hero-pill {
  border-color: rgba(0, 153, 179, 0.3);
}

/* RSS link */
.rss-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  transition: all 0.2s ease;
  margin-bottom: 16px;
}
.rss-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
  text-decoration: none;
}

/* Episode list & cards */
.episodes-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.episode-card {
  display: block;
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.episode-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
  border-color: rgba(0, 216, 255, 0.3);
  text-decoration: none;
}
[data-theme="light"] .episode-card:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
  border-color: rgba(0, 153, 179, 0.3);
}
.episode-card:hover .episode-title {
  color: var(--accent);
}
.episode-date {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.episode-title {
  font-size: 1.15rem;
  color: var(--accent-light);
  margin: 0 0 12px 0;
  font-weight: bold;
  transition: color 0.2s ease;
}
.episode-meta {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Content card (markdown pages) */
.content-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
}
.content-card h1 { font-size: 1.8rem; font-weight: bold; color: var(--strong); margin-bottom: 8px; letter-spacing: 0.05em; }
.content-card h2 { font-size: 1.25rem; color: var(--strong); margin-top: 28px; margin-bottom: 16px; }
.content-card h3 { font-size: 1.05rem; color: var(--accent-light); margin-top: 20px; margin-bottom: 8px; }
.content-card p { margin-bottom: 12px; color: var(--text); }
.content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 12px; }
.content-card li { margin-bottom: 6px; }

/* Notice card */
.notice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
  margin-top: 32px;
}
.notice-card h2 {
  font-size: 1.25rem;
  color: var(--accent-light);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(108, 138, 255, 0.2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.notice-card h3 {
  font-size: 1rem;
  color: var(--accent-light);
  margin-bottom: 12px;
}
.notice-card ul { list-style: none; padding-left: 0; margin: 0; }
.notice-card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
}
.notice-card li::before {
  content: '\25A0';
  position: absolute;
  left: 0;
  color: var(--text-muted);
  font-size: 0.6em;
  top: 0.5em;
}
.notice-card li:last-child { margin-bottom: 0; }

/* Pagination */
.page-heading {
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 20px;
  color: var(--strong);
}
.pagination {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin: 24px 0;
}
.pagination a,
.pagination span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
}
.pagination a:hover {
  border-color: var(--accent);
  text-decoration: none;
}
.pagination .current {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.pagination .summary {
  min-width: auto;
  color: var(--text-muted);
  background: transparent;
  border: none;
}

/* Episode page */
.episode-page .cover {
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
  border-radius: var(--border-radius);
  margin-bottom: 2rem;
  display: block;
}
.episode-page audio {
  width: 100%;
  margin-bottom: 1rem;
}
.episode-page .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 2rem;
  margin-bottom: 2rem;
}
.episode-page .content h1 { font-size: 1.4rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--strong); }
.episode-page .content h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-light); }
.episode-page .content h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
.episode-page .content p { margin-bottom: 0.75rem; }
.episode-page .content ul, .episode-page .content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
.episode-page .content li { margin-bottom: 0.3rem; }
.episode-page .content strong { color: var(--strong); }
.episode-page .content em { color: var(--text-muted); }
.episode-page .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.episode-page .content a { word-break: break-all; }

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  overflow-x: auto;
  white-space: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: bold;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: color 0.2s ease;
  position: relative;
}
.tab-btn:hover { color: var(--strong); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Disclosure list */
.disclosure-list {
  list-style: none;
  margin-left: 0;
}
.disclosure-list li {
  position: relative;
  padding-left: 1rem;
}
.disclosure-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--accent-light);
}

/* Buttons */
.button-link,
.consent-action {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 0.7rem 1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.button-link:hover,
.consent-action:hover {
  border-color: var(--accent);
}
.button-link.primary,
.consent-action.primary {
  background: var(--accent-light);
  border-color: var(--accent-light);
  color: #fff;
}
.button-link.primary:hover,
.consent-action.primary:hover {
  opacity: 0.85;
}

/* Contact form */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.form-grid {
  display: flex;
  gap: 20px;
}
.form-grid > div { flex: 1; }
.contact-form label {
  display: block;
  font-size: 0.9rem;
  color: var(--text);
  font-weight: bold;
  margin-bottom: 8px;
}
.contact-form input,
.contact-form textarea,
.contact-form select {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--strong);
  padding: 12px;
  border-radius: 6px;
  font-size: 1rem;
  font-family: inherit;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
[data-theme="light"] .contact-form input,
[data-theme="light"] .contact-form textarea,
[data-theme="light"] .contact-form select {
  border-color: var(--border);
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0, 216, 255, 0.2);
}
.contact-form textarea {
  min-height: 180px;
  resize: vertical;
}
.checkbox-row {
  display: flex;
  gap: 8px;
  align-items: center;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-muted);
}
.checkbox-row input { width: auto; }
.contact-form button {
  background: var(--accent-light);
  color: #fff;
  font-weight: bold;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.1s ease;
  width: 100%;
}
.contact-form button:hover { opacity: 0.85; }
.contact-form button:active { transform: scale(0.98); }
.fine-print {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Footer */
.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 0.75rem;
}
.footer-links a,
.footer-links button {
  font-size: 0.88rem;
  color: var(--text-muted);
}
.footer-links button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 0 2rem;
  margin-top: 2rem;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
}
footer .container { padding: 0 20px; }

/* Consent banner */
.consent-banner {
  position: fixed;
  left: 1rem;
  right: 1rem;
  bottom: 1rem;
  z-index: 1000;
  max-width: 720px;
  margin: 0 auto;
  padding: 1rem 1rem 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
}
.consent-banner[hidden] { display: none; }
.consent-banner h3 {
  font-size: 1rem;
  margin-bottom: 0.45rem;
}
.consent-banner p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
}
.consent-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

/* Feedback Form */
.feedback-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 12px;
  background: var(--card-bg, var(--surface));
}
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.star-rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: 0.25rem;
}
.star-rating input { display: none; }
.star-rating label {
  cursor: pointer;
  font-size: 1.5rem;
  color: var(--text-muted);
}
.star-rating label::before { content: "★"; }
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label {
  color: #f5a623;
}
.feedback-form label {
  display: block;
  font-weight: bold;
  margin-bottom: 0.5rem;
  color: var(--text);
}
.feedback-form textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  resize: vertical;
}
.feedback-form button {
  margin-top: 0.5rem;
  padding: 0.5rem 1.5rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}
.feedback-form button:hover {
  opacity: 0.9;
}

/* SNS Share Buttons */
.share-buttons {
  display: flex;
  gap: 1rem;
  margin: 1.5rem 0;
  flex-wrap: wrap;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 600;
}
.share-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
  text-decoration: none;
}
.share-x { color: var(--accent); }
.share-x:hover { background: var(--accent-soft); }
.share-fb { color: #1877f2; }
.share-fb:hover { background: rgba(24, 119, 242, 0.1); border-color: #1877f2; }

/* Responsive */
@media (max-width: 650px) {
  .col-half { width: 100%; }
  .form-grid { flex-direction: column; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
  header .container { padding: 16px; }
  .hero-card,
  .content-card,
  .notice-card,
  .card { padding: 20px; }
  .episode-page .content { padding: 1.25rem; }
  .header-row { align-items: flex-start; }
  .consent-banner { left: 0.75rem; right: 0.75rem; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme(){
  var el = document.documentElement;
  if (el.getAttribute('data-theme') === 'light') {
    el.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    el.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
  updateIcon();
}
function updateIcon(){
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '\u263E' : '\u2600';
}
document.addEventListener('DOMContentLoaded', updateIcon);
</script>

<script>
const PLAUSIBLE_DOMAIN = "";
const PLAUSIBLE_SCRIPT_SRC = "https://plausible.io/js/script.js";
const ANALYTICS_CONSENT_KEY = 'site.analyticsConsent';

function loadPlausible() {
  if (!PLAUSIBLE_DOMAIN) return;
  if (document.querySelector('script[data-plausible-loader="true"]')) return;
  var script = document.createElement('script');
  script.defer = true;
  script.src = PLAUSIBLE_SCRIPT_SRC;
  script.setAttribute('data-domain', PLAUSIBLE_DOMAIN);
  script.setAttribute('data-plausible-loader', 'true');
  document.head.appendChild(script);
}

function hideConsentBanner() {
  var banner = document.getElementById('consent-banner');
  if (banner) banner.hidden = true;
}

function showConsentBanner() {
  var banner = document.getElementById('consent-banner');
  if (banner) banner.hidden = false;
}

function updateConsentUi() {
  if (!PLAUSIBLE_DOMAIN) {
    hideConsentBanner();

🎯 **今日のアクション**
現時点ではEyotは開発途中と見られるため、まずは公式サイトやブログで設計思想と進捗を確認しましょう。GPU活用が必要なプロジェクトを抱えるチームは、将来の採用候補としてウォッチリストに加えておくと良いでしょう。

## ⚙️ Dockerコンテナの10年
\`DevOps\` \`Cloud\` \`OSS\`

<details>
<summary>📄 原題: A decade of Docker containers</summary>
</details>

> **一言で**: Dockerコンテナ技術が誕生から10年を迎えた

- 要点1: Dockerは2013年に登場し、アプリの「動作環境ごとパッケージ化」を実現した
- 要点2: コンテナ技術はKubernetesなどのエコシステムを生み出し、クラウド基盤の標準となった
- 要点3: 10年間でソフトウェアの開発・配布・運用のあり方を根本から変えた

💡 **なぜ重要か**
Dockerは2013年のDockerCon（開発者向けカンファレンス）で初めて公開されました。それ以前は、環境の差異による「自分のマシンでは動くのに」問題が開発現場の悩みの種でした。Dockerはアプリと依存ライブラリをひとまとめにした「コンテナ」という単位を広め、開発・テスト・本番環境の差異を大幅に減らしました。その後Kubernetes（Googleが開発したコンテナ管理基盤）の台頭とあいまって、クラウドネイティブ開発の礎となりました。 Dockerの登場はDevOps（開発と運用の融合）やマイクロサービス（小さな機能単位でシステムを構成する設計手法）の普及を加速させました。今や主要クラウドサービスはすべてコンテナを前提に設計されており、AIモデルの配布にもコンテナが使われるなど、影響は次世代技術にも及んでいます。今後10年もコンテナ技術は進化を続け、セキュリティや軽量化の面でさらに洗練されていくと見られています。

🎯 **今日のアクション**
コンテナの基礎を改めて見直す良い機会です。Dockerの歴史を振り返りつつ、自社のコンテナ活用が最新のベストプラクティスに沿っているか確認しましょう。特にセキュリティスキャンや最小権限イメージの運用は、今すぐ点検する価値があります。

🔗 [原文を読む](https://cacm.acm.org/research/a-decade-of-docker-containers/)

function renderMarkdown(md) {
  if (typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
    marked.setOptions({ breaks: true });
    return DOMPurify.sanitize(marked.parse(md));
  }
  var el = document.createElement('pre');
  el.style.whiteSpace = 'pre-wrap';
  el.textContent = md;
  return el.outerHTML;
}
document.getElementById('tab-blog').innerHTML = renderMarkdown(blogMd);
document.getElementById('tab-notes').innerHTML = renderMarkdown(notesMd);

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if (tab === 'blog') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('tab-blog').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('tab-notes').classList.add('active');
  }
}
